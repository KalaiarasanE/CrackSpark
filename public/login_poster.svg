<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="30%" stop-color="#064e3b" />
      <stop offset="70%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#061c14" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe699" />
      <stop offset="25%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#fff3c4" />
      <stop offset="75%" stop-color="#aa7c11" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <linearGradient id="goldMetallic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#b8860b" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>

    <radialGradient id="glowAura" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#022c22" stop-opacity="0" />
    </radialGradient>

    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Full Canvas Emerald Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)" />

  <!-- Radial Aura Glow -->
  <circle cx="540" cy="500" r="600" fill="url(#glowAura)" />

  <!-- Outer Filigree Gold Border Frame (Near Canvas Edge) -->
  <rect x="25" y="25" width="1030" height="1870" rx="16" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.95" />
  <rect x="40" y="40" width="1000" height="1840" rx="12" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="10, 6" opacity="0.75" />

  <!-- Metallic Top & Bottom Golden Rods -->
  <rect x="50" y="15" width="980" height="18" rx="9" fill="url(#goldMetallic)" filter="url(#goldGlow)" />
  <rect x="50" y="1887" width="980" height="18" rx="9" fill="url(#goldMetallic)" filter="url(#goldGlow)" />

  <!-- Decorative Corner Ornaments -->
  <!-- Top Left -->
  <path d="M 45 120 L 120 45 L 140 45 L 45 140 Z" fill="url(#goldGrad)" />
  <circle cx="65" cy="65" r="8" fill="url(#goldGrad)" />
  <!-- Top Right -->
  <path d="M 1035 120 L 960 45 L 940 45 L 1035 140 Z" fill="url(#goldGrad)" />
  <circle cx="1015" cy="65" r="8" fill="url(#goldGrad)" />
  <!-- Bottom Left -->
  <path d="M 45 1800 L 120 1875 L 140 1875 L 45 1780 Z" fill="url(#goldGrad)" />
  <circle cx="65" cy="1855" r="8" fill="url(#goldGrad)" />
  <!-- Bottom Right -->
  <path d="M 1035 1800 L 960 1875 L 940 1875 L 1035 1780 Z" fill="url(#goldGrad)" />
  <circle cx="1015" cy="1855" r="8" fill="url(#goldGrad)" />

  <!-- TOP BRAND SECTION -->
  <g transform="translate(540, 360)">
    <!-- Logo Outer Ring -->
    <circle cx="0" cy="0" r="110" fill="#064e3b" stroke="url(#goldGrad)" stroke-width="8" filter="url(#goldGlow)" />
    <!-- Logo Inner Spark Motif -->
    <polygon points="0,-75 22,-20 75,0 22,20 0,75 -22,20 -75,0 -22,-20" fill="url(#goldGrad)" />
    <circle cx="0" cy="0" r="16" fill="#fff3c4" />
  </g>

  <!-- BRAND NAME & SUBTITLE -->
  <text x="540" y="560" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="72" font-weight="900" letter-spacing="6" fill="url(#goldGrad)" text-anchor="middle" filter="url(#goldGlow)">
    CRACKSPARK
  </text>
  <text x="540" y="620" font-family="'Inter', sans-serif" font-size="28" font-weight="800" letter-spacing="12" fill="#6ee7b7" text-anchor="middle">
    GOV EXAM PORTAL
  </text>

  <!-- DIVIDER LINE -->
  <path d="M 340 680 L 510 680 L 540 695 L 570 680 L 740 680" stroke="url(#goldGrad)" stroke-width="3" fill="none" />

  <!-- CENTER INSPIRATIONAL TAMIL QUOTE -->
  <g transform="translate(540, 1020)">
    <rect x="-420" y="-180" width="840" height="360" rx="24" fill="#022c22" opacity="0.65" stroke="url(#goldGrad)" stroke-width="2" />
    <text x="0" y="-70" font-family="'Noto Sans Tamil', 'Inter', sans-serif" font-size="68" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" filter="url(#goldGlow)">
      வெற்றி உன் கையில்
    </text>
    <text x="0" y="20" font-family="'Inter', sans-serif" font-size="32" font-weight="700" letter-spacing="4" fill="#fef3c7" text-anchor="middle">
      YOUR SUCCESS IS IN YOUR HANDS
    </text>
    <text x="0" y="100" font-family="'Inter', sans-serif" font-size="24" font-weight="600" letter-spacing="2" fill="#a7f3d0" text-anchor="middle">
      Complete Preparation • Mock Tests • AI Guidance
    </text>
  </g>

  <!-- BOTTOM STATS BADGE -->
  <g transform="translate(540, 1480)">
    <rect x="-350" y="-60" width="700" height="120" rx="60" fill="url(#goldGrad)" />
    <text x="0" y="12" font-family="'Outfit', sans-serif" font-size="36" font-weight="900" letter-spacing="3" fill="#022c22" text-anchor="middle">
      100K+ ASPIRANTS TRUST CRACKSPARK
    </text>
  </g>

  <!-- SPARKLE PARTICLES -->
  <g fill="#ffe699">
    <circle cx="200" cy="300" r="4" opacity="0.8" />
    <circle cx="880" cy="340" r="6" opacity="0.9" />
    <circle cx="150" cy="850" r="5" opacity="0.7" />
    <circle cx="920" cy="950" r="4" opacity="0.8" />
    <circle cx="250" cy="1300" r="6" opacity="0.85" />
    <circle cx="830" cy="1350" r="5" opacity="0.9" />
  </g>
</svg>